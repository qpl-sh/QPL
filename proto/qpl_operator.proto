syntax = "proto3";

package qpl.v1;

import "qpl_types.proto";

// External API: SDK → Operator Node
// Protocols call these to use QPL services.
service QplOperatorService {
  // === Discovery & Fees ===

  // Get this node's capabilities and status.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);

  // Estimate the fee for an operation before payment.
  rpc EstimateFee(EstimateFeeRequest) returns (EstimateFeeResponse);

  // === Signing Service ===

  // Request a threshold ML-DSA signature.
  rpc RequestSign(SignRequest) returns (SignResponse);

  // Check status of a pending sign request.
  rpc GetSignStatus(GetStatusRequest) returns (SignStatusResponse);

  // === Proving Service ===

  // Request a STARK proof for a transaction batch.
  rpc RequestProve(ProveRequest) returns (ProveResponse);

  // Check status of a pending prove request.
  rpc GetProofStatus(GetStatusRequest) returns (ProofStatusResponse);

  // === Health ===

  // Check node health.
  rpc HealthCheck(HealthCheckRequest) returns (HealthResponse);
}

// === Request/Response Messages ===

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  OperatorId operator_id = 1;
  uint32 capabilities_bitmask = 2;
  OperatorStatus status = 3;
  string version = 4;
  uint32 active_peers = 5;
}

message EstimateFeeRequest {
  ServiceType service_type = 1;
  string operation = 2; // e.g., "sign", "prove_small", "prove_large", "verify"
  QuorumConfig quorum = 3; // optional for threshold ops
  Urgency urgency = 4;
}

message EstimateFeeResponse {
  FeeEstimate estimate = 1;
}

// --- Signing ---

message SignRequest {
  RequestId request_id = 1;
  bytes message = 2;
  QuorumConfig quorum = 3;
  FeePaymentProof fee_proof = 4;
  Urgency urgency = 5;
}

message SignResponse {
  RequestId request_id = 1;
  bytes signature = 2; // ML-DSA-65 signature
  OperatorId coordinator = 3;
  bool success = 4;
  string error_message = 5;
}

message GetStatusRequest {
  RequestId request_id = 1;
}

message SignStatusResponse {
  RequestId request_id = 1;
  string status = 2; // "pending", "collecting", "completed", "failed"
  uint32 partials_collected = 3;
  uint32 partials_needed = 4;
}

// --- Proving ---

message ProveRequest {
  RequestId request_id = 1;
  bytes transactions = 2; // serialized transaction batch
  ProofConfig config = 3;
  FeePaymentProof fee_proof = 4;
  Urgency urgency = 5;
}

message ProveResponse {
  RequestId request_id = 1;
  bytes proof = 2; // serialized STARK proof
  bytes public_inputs = 3;
  bool success = 4;
  string error_message = 5;
}

message ProofStatusResponse {
  RequestId request_id = 1;
  string status = 2;
  uint32 verifications_received = 3;
  uint32 verifications_needed = 4;
}

// --- Health ---

message HealthCheckRequest {}
