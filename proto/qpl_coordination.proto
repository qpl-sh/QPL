syntax = "proto3";

package qpl.v1;

import "qpl_types.proto";

// Internal API: Node → Node
// Operators use this for peer coordination, threshold signing,
// proof verification, and network maintenance.
service QplCoordinationService {
  // === Peer Lifecycle ===

  // Initial handshake when connecting to a peer.
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);

  // Periodic liveness signal.
  rpc Heartbeat(HeartbeatMessage) returns (HeartbeatAck);

  // === Threshold Signing Coordination ===

  // Request a partial signature from a shard-holding operator.
  rpc RequestPartialSign(PartialSignRequest) returns (PartialSignResponse);

  // === Proof Verification Quorum ===

  // Request proof verification from a peer.
  rpc VerifyProof(VerifyProofRequest) returns (VerifyProofVote);

  // === Request Forwarding ===

  // Forward a request to a more suitable operator.
  rpc ForwardRequest(ForwardedRequest) returns (ForwardAck);

  // === State Sync ===

  // Sync operator registry state with a peer.
  rpc SyncOperatorState(StateSyncRequest) returns (StateSyncResponse);
}

// === Handshake ===

message HandshakeRequest {
  OperatorId operator_id = 1;
  bytes public_key = 2; // ML-DSA public key
  uint32 capabilities_bitmask = 3;
  string endpoint = 4;
  bytes stake_proof = 5; // tx_hash proving stake
  string version = 6;
  uint64 timestamp = 7;
  bytes signature = 8; // ML-DSA signature over the above fields
}

message HandshakeResponse {
  OperatorId operator_id = 1;
  bytes public_key = 2;
  uint32 capabilities_bitmask = 3;
  string endpoint = 4;
  bool accepted = 5;
  string reject_reason = 6;
  repeated PeerEntry known_peers = 7; // share peer list
  bytes signature = 8;
}

message PeerEntry {
  OperatorId operator_id = 1;
  string endpoint = 2;
  uint32 capabilities_bitmask = 3;
}

// === Heartbeat ===

message HeartbeatMessage {
  OperatorId operator_id = 1;
  uint64 timestamp_unix = 2;
  float load_factor = 3;
  uint32 active_requests = 4;
  uint64 sequence = 5;
  bytes signature = 6;
}

message HeartbeatAck {
  OperatorId operator_id = 1;
  uint64 timestamp_unix = 2;
  uint64 sequence = 3;
}

// === Threshold Signing ===

message PartialSignRequest {
  RequestId request_id = 1;
  OperatorId coordinator_id = 2;
  bytes message = 3; // the message to sign
  uint32 shard_index = 4; // which shard to use
  uint64 deadline_unix = 5;
  bytes coordinator_signature = 6; // proves coordinator legitimacy
}

message PartialSignResponse {
  RequestId request_id = 1;
  OperatorId responder_id = 2;
  uint32 shard_index = 3;
  bytes partial_data = 4; // shard contribution
  bool success = 5;
  string error_message = 6;
  bytes signature = 7; // ML-DSA signature over response
}

// === Proof Verification ===

message VerifyProofRequest {
  RequestId request_id = 1;
  OperatorId prover_id = 2;
  bytes proof = 3;
  bytes public_inputs = 4;
  uint64 deadline_unix = 5;
}

message VerifyProofVote {
  RequestId request_id = 1;
  OperatorId verifier_id = 2;
  bool valid = 3;
  string reason = 4; // if invalid, why
  bytes signature = 5;
}

// === Request Forwarding ===

message ForwardedRequest {
  RequestId original_request_id = 1;
  OperatorId original_sender = 2;
  ServiceType service_type = 3;
  bytes payload = 4; // serialized original request
  uint64 deadline_unix = 5;
}

message ForwardAck {
  RequestId request_id = 1;
  bool accepted = 2;
  string reason = 3;
}

// === State Sync ===

message StateSyncRequest {
  OperatorId requester_id = 1;
  uint64 last_known_version = 2;
}

message StateSyncResponse {
  uint64 current_version = 1;
  repeated OperatorInfo operators = 2;
  bool is_full_sync = 3;
}
