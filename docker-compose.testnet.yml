# QPL Testnet — 5-node operator network + Solana test validator
#
# Usage:
#   docker compose -f docker-compose.testnet.yml up --build
#
# This spins up:
#   - 5 QPL operator nodes (ports 9000-9040)
#   - 1 Solana test validator on port 8899 (RPC) / 8900 (WS)
#   - Program deployment on startup

services:
  # ─── Local Solana Validator ─────────────────────────────────────────
  solana-validator:
    image: solanalabs/solana:v1.18
    command: ["solana-test-validator", "--bind-address", "0.0.0.0", "--rpc-port", "8899"]
    ports:
      - "8899:8899"
      - "8900:8900"
    healthcheck:
      test: ["CMD", "solana", "cluster-version", "--url", "http://localhost:8899"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ─── QPL Operator Nodes ──────────────────────────────────────────────
  qpl-node-1:
    build:
      context: .
      dockerfile: services/qpl-node/Dockerfile
    ports:
      - "9000:9000"
    environment:
      - QPL_NODE_NAME=qpl-operator-1
      - QPL_LISTEN_ADDR=0.0.0.0:9000
      - QPL_SOLANA_RPC=http://solana-validator:8899
      - RUST_LOG=info
    command: ["--listen", "0.0.0.0:9000", "--name", "qpl-operator-1"]
    depends_on:
      solana-validator:
        condition: service_healthy
    volumes:
      - node1-data:/qpl/data

  qpl-node-2:
    build:
      context: .
      dockerfile: services/qpl-node/Dockerfile
    ports:
      - "9010:9000"
    environment:
      - QPL_NODE_NAME=qpl-operator-2
      - QPL_LISTEN_ADDR=0.0.0.0:9000
      - QPL_SOLANA_RPC=http://solana-validator:8899
      - RUST_LOG=info
    command: ["--listen", "0.0.0.0:9000", "--name", "qpl-operator-2"]
    depends_on:
      solana-validator:
        condition: service_healthy
    volumes:
      - node2-data:/qpl/data

  qpl-node-3:
    build:
      context: .
      dockerfile: services/qpl-node/Dockerfile
    ports:
      - "9020:9000"
    environment:
      - QPL_NODE_NAME=qpl-operator-3
      - QPL_LISTEN_ADDR=0.0.0.0:9000
      - QPL_SOLANA_RPC=http://solana-validator:8899
      - RUST_LOG=info
    command: ["--listen", "0.0.0.0:9000", "--name", "qpl-operator-3"]
    depends_on:
      solana-validator:
        condition: service_healthy
    volumes:
      - node3-data:/qpl/data

  qpl-node-4:
    build:
      context: .
      dockerfile: services/qpl-node/Dockerfile
    ports:
      - "9030:9000"
    environment:
      - QPL_NODE_NAME=qpl-operator-4
      - QPL_LISTEN_ADDR=0.0.0.0:9000
      - QPL_SOLANA_RPC=http://solana-validator:8899
      - RUST_LOG=info
    command: ["--listen", "0.0.0.0:9000", "--name", "qpl-operator-4"]
    depends_on:
      solana-validator:
        condition: service_healthy
    volumes:
      - node4-data:/qpl/data

  qpl-node-5:
    build:
      context: .
      dockerfile: services/qpl-node/Dockerfile
    ports:
      - "9040:9000"
    environment:
      - QPL_NODE_NAME=qpl-operator-5
      - QPL_LISTEN_ADDR=0.0.0.0:9000
      - QPL_SOLANA_RPC=http://solana-validator:8899
      - RUST_LOG=info
    command: ["--listen", "0.0.0.0:9000", "--name", "qpl-operator-5"]
    depends_on:
      solana-validator:
        condition: service_healthy
    volumes:
      - node5-data:/qpl/data

volumes:
  node1-data:
  node2-data:
  node3-data:
  node4-data:
  node5-data:
