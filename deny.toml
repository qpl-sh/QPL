# cargo-deny configuration for QPL
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2

# Allow-list known unmaintained crates that are accepted residual risks.
# These are tracked in THREAT_MODEL.md as R-2.
ignore = [
    # pqcrypto-* crates are upstream-maintained and FIPS-validated.
    # "Unmaintained" status is due to infrequent releases, not security issues.
    { id = "RUSTSEC-2024-0388", reason = "pqcrypto-traits is transitively unmaintained; upstream is FIPS-validated" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
