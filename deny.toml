# cargo-deny configuration for QPL
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2

# Allow-list known unmaintained crates that are accepted residual risks.
# These are tracked in THREAT_MODEL.md as R-2.
ignore = [
    # paste is a transitive dependency; no safe upgrade available
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained; transitive dep from pqcrypto ecosystem" },
    # pqcrypto-* crates: PQClean being archived July 2026; FIPS-validated implementations
    { id = "RUSTSEC-2026-0161", reason = "pqcrypto-mlkem unmaintained; FIPS 203 validated, migration to ml-kem planned" },
    { id = "RUSTSEC-2026-0162", reason = "pqcrypto-traits unmaintained; FIPS validated trait definitions" },
    { id = "RUSTSEC-2026-0163", reason = "pqcrypto-internals unmaintained; FIPS validated internal FFI" },
    { id = "RUSTSEC-2026-0166", reason = "pqcrypto-mldsa unmaintained; FIPS 204 validated, migration to ml-dsa planned" },
    # rustls-pemfile archived; functionality moved to rustls-pki-types
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; transitive dep, functionality in rustls-pki-types" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
